spring.application.name=prompt-review-service

server.port=${PROMPT_REVIEW_SERVICE_PORT:8001}

# Directory where review JSON files will be stored
review.storage.path=${REVIEW_STORAGE_PATH:reviews}

# Prompt Service URL
prompt.service.url=${PROMPT_SERVICE_URL:http://localhost:8000/api/prompts}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Don't crash on extra fields prompt-service might add later
spring.jackson.deserialization.fail-on-unknown-properties=false
