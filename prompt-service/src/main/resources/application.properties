spring.application.name=prompt-service

server.port=${PROMPT_SERVICE_PORT:8000}

spring.datasource.url=${PROMPT_SERVICE_DB_URL:jdbc:sqlite:prompt_manager.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Serialize dates as ISO-8601 strings (not numeric arrays) so other services can deserialize them
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

app.auth.username=${APP_AUTH_USERNAME}
app.auth.password=${APP_AUTH_PASSWORD}
